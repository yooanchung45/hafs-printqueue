[printer]
bed_shape                   = 0x0,256x0,256x256,0x256
max_print_height            = 256
nozzle_diameter             = 0.4
printer_technology          = FFF
use_relative_e_distances    = 1
remaining_times             = 1

; These are intentionally blank — bambu_postprocess.py injects the real
; Bambu A1 machine start/end sequences at runtime.
start_gcode                 =
end_gcode                   =
before_layer_gcode          =
layer_gcode                 =
toolchange_gcode            =

; Retraction — 0.8mm at 45mm/s is safe for PLA on the A1's direct drive.
; Increase retract_speed to 60 if you see stringing on fine details.
retract_length              = 0.8
retract_speed               = 45
retract_lift                = 0.2


[print]

; ── ACCELERATIONS (mm/s²) ────────────────────────────────────────────────────
; PrusaSlicer emits M204 commands in the gcode body using these values.
; They override the machine-level M204 P12000 set in the Bambu start gcode
; for their respective move types, so the printer uses these mid-print.
;
; The Bambu A1 machine ceiling is 12000 mm/s² (set in start gcode M201/M204).
; We stay well below that — high accel on a bedslinger causes the Y axis
; (moving bed) to vibrate and leave ringing artifacts on the print surface.
;
; Rule of thumb:
;   outer wall → lowest accel (it's what you see)
;   inner wall → moderate
;   infill     → high (hidden, nobody cares)
;   first layer → very low (adhesion is everything)
;   bridge     → low (unsupported, needs controlled flow)

default_acceleration        = 5000   ; catch-all fallback
perimeter_acceleration      = 3000   ; both outer and inner walls
infill_acceleration         = 8000   ; infill can push harder, it's hidden
bridge_acceleration         = 2000   ; bridges are unsupported — keep gentle
first_layer_acceleration    = 1000   ; first layer: slow and controlled


; ── SPEEDS (mm/s) ────────────────────────────────────────────────────────────
; Old outer wall was 80, inner 150, infill 200, travel 250.
; Bumped substantially — these are still conservative vs Bambu Studio's
; native "Standard" profile (~200/250/300/500) but a big step up from before.
;
; Outer wall (external_perimeter) is the most important — it's the surface
; everyone sees. We raised it to 150 but kept accel low (3000) so corners
; stay sharp. Inner wall and infill can go faster since they're buried.

; Walls
external_perimeter_speed    = 180    ; outer wall  (was 80)
perimeter_speed             = 250    ; inner walls (was 150)

; Infill
infill_speed                = 300    ; sparse infill (was 200)
solid_infill_speed          = 200    ; solid layers — floors/ceilings (was 130)
top_solid_infill_speed      = 120    ; top surface, visible (was 80)

; First layer — never touch this, adhesion beats everything
first_layer_speed           = 30

; Support and bridges
support_material_speed      = 200    ; supports (was 150)
bridge_speed                = 60     ; bridges over air (was 50)
gap_fill_speed              = 80     ; thin gaps between walls (was 40)

; Travel — non-printing moves, go fast, no quality impact
travel_speed                = 450    ; (was 250, machine ceiling is 500)