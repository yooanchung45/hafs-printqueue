<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}HAFS PrintQueue{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/favicon-180x180.png">
</head>
<body>
    <header class="site-header">
        <div class="container">
            <a href="/" class="logo">HAFS PrintQueue</a>
            <nav>
                {% if user %}
                    <span class="user-info">
                        {{ user.name }}
                        {% if user.role.value == "admin" %}
                            <span class="badge badge-admin">관리자</span>
                        {% endif %}
                    </span>
                    <a href="/auth/logout" class="btn btn-ghost">로그아웃</a>
                {% endif %}
            </nav>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>HAFS PrintQueue · 용인한국외국어대학교부설고등학교 메이커 시스템</p>
            <p>By Jiu Yun, Yooan Chung & Siwon Choi</p>
        </div>
    </footer>

    <div id="loading-bar"></div>
    <script>
    (function () {
        var bar = document.getElementById('loading-bar');
        var timer = null;

        function startLoading() {
            if (timer) clearTimeout(timer);
            bar.style.transition = 'none';
            bar.style.width = '0%';
            bar.style.opacity = '1';
            requestAnimationFrame(function () {
                requestAnimationFrame(function () {
                    bar.style.transition = 'width 20s cubic-bezier(0.05, 0.5, 0.1, 1)';
                    bar.style.width = '88%';
                });
            });
        }

        function finishLoading() {
            if (timer) clearTimeout(timer);
            bar.style.transition = 'width 0.2s ease';
            bar.style.width = '100%';
            timer = setTimeout(function () {
                bar.style.transition = 'opacity 0.3s ease';
                bar.style.opacity = '0';
            }, 200);
        }

        finishLoading();

        document.addEventListener('click', function (e) {
            var a = e.target.closest('a[href]');
            if (!a) return;
            var href = a.getAttribute('href');
            if (!href || href.startsWith('#') || href.startsWith('javascript:') ||
                a.target === '_blank' || a.hasAttribute('download')) return;
            try {
                var url = new URL(href, window.location.href);
                if (url.origin === window.location.origin) startLoading();
            } catch (err) {}
        });

        document.addEventListener('submit', function () {
            startLoading();
        });
    })();
    </script>
</body>
</html>
